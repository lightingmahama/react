<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Notifications - Unipra Gallery</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333;
            min-height: 100vh;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 2rem;
        }

        header {
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 1.5rem 2rem;
            border-radius: 12px;
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        header h1 {
            margin: 0;
            font-size: 1.8rem;
            font-weight: 600;
        }

        .header-links {
            display: flex;
            gap: 1rem;
        }

        .header-links a {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            padding: 0.6rem 1.2rem;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .header-links a:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3);
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: white;
            padding: 1.5rem;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .stat-card h3 {
            margin: 0;
            color: #667eea;
            font-size: 2rem;
            font-weight: 700;
        }

        .stat-card p {
            margin: 0.5rem 0 0;
            color: #666;
            font-size: 0.95rem;
        }

        .notifications {
            display: grid;
            gap: 1rem;
        }

        .notification-item {
            background: white;
            padding: 1.5rem;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            border-left: 4px solid #28a745;
            animation: slideIn 0.4s ease-out;
            display: grid;
            grid-template-columns: 1fr auto;
            align-items: start;
            gap: 1rem;
        }

        .notification-item.new {
            border-left-color: #f39c12;
            background: #fffbf0;
        }

        .notification-content h3 {
            margin: 0 0 0.5rem;
            color: #333;
            font-size: 1.1rem;
        }

        .notification-content p {
            margin: 0.3rem 0;
            color: #666;
            font-size: 0.95rem;
        }

        .notification-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            margin-top: 0.8rem;
            font-size: 0.85rem;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            color: #888;
            background: #f9f9f9;
            padding: 0.4rem 0.8rem;
            border-radius: 4px;
        }

        .price {
            font-weight: 700;
            color: #28a745;
            font-size: 1.2rem;
            padding: 0.5rem 1rem;
            background: #e8f8f0;
            border-radius: 8px;
            text-align: right;
        }

        .status-badge {
            display: inline-block;
            padding: 0.4rem 0.8rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            margin-top: 0.5rem;
        }

        .status-badge.booked {
            background: #d4edda;
            color: #155724;
        }

        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: white;
        }

        .empty-state h2 {
            margin: 0;
            font-size: 1.5rem;
        }

        .empty-state p {
            margin: 0.5rem 0 0;
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .status-indicator {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.4rem 0.8rem;
            background: rgba(40, 167, 69, 0.1);
            color: #28a745;
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #28a745;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 768px) {
            header {
                flex-direction: column;
                gap: 1rem;
            }

            header h1 {
                font-size: 1.4rem;
            }

            .header-links {
                width: 100%;
                flex-direction: column;
            }

            .header-links a {
                text-align: center;
            }

            .notification-item {
                grid-template-columns: 1fr;
            }

            .price {
                text-align: left;
            }
        }
        .banner {
  /* Layout: Not centered, takes full width or stays left */
  position: relative;
  display: inline-flex; /* Shrinks to fit content, stays left */
  align-items: center;
  padding: 1.2rem 2.5rem;
  margin: 20px; /* Space from the edge of the screen */
  background: rgba(15, 23, 42, 0.9); /* Deep slate */
  backdrop-filter: blur(12px);
  border-radius: 16px;
  border: 1px solid rgba(255, 255, 255, 0.1);
  cursor: pointer;
  overflow: hidden;
  transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
}

/* ::before: The Animated Scanning Light */
.banner::before {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 50%;
  height: 100%;
  background: linear-gradient(
    90deg,
    transparent,
    rgba(99, 102, 241, 0.2),
    transparent
  );
  animation: scan 3s infinite;
}

/* ::after: The Premium Bottom Accent Line */
.banner::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 0;
  width: 0;
  height: 3px;
  background: linear-gradient(90deg, #6366f1, #ec4899);
  transition: width 0.4s ease;
}

.banner:hover {
  transform: translateX(10px); /* Slight nudge instead of centering */
  background: rgba(30, 41, 59, 0.95);
  box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.5);
}

.banner:hover::after {
  width: 100%;
}

.banner {
  color: #f8fafc;
  font-family: 'Inter', sans-serif;
  font-size: 1.1rem;
  z-index: 2;
  letter-spacing: 0.5px;
}

.number {
  color: #818cf8; /* Indigo glow */
  font-weight: 800;
  margin-left: 8px;
  text-shadow: 0 0 15px rgba(129, 140, 248, 0.4);
  transition: color 0.3s ease;
}

.banner:hover .number {
  color: #fff;
}

/* Success Badge Animation */
.copy-badge {
  margin-left: 15px;
  font-size: 10px;
  text-transform: uppercase;
  background: #10b981;
  color: white;
  padding: 4px 8px;
  border-radius: 6px;
  animation: popIn 0.3s ease-out;
}

/* Keyframes */
@keyframes scan {
  100% { left: 150%; }
}

@keyframes popIn {
  0% { transform: scale(0); opacity: 0; }
  100% { transform: scale(1); opacity: 1; }
}
    </style>
</head>
<body>
    <div class="banner"><span>All payment can be made to 0553111407</span> </div>
        <div id="root"></div>
    <div id="root"></div>
    

    <script type="text/babel">
        const { useState, useEffect } = React;

        function Notifications() {
            const [bookings, setBookings] = useState([]);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState('');
            const [serverStatus, setServerStatus] = useState('checking');

            const API_URL = 'https://react-kohl-eight-21.vercel.app';

            const fetchBookings = async () => {
                try {
                    const res = await fetch(`${API_URL}/api/bookings`);
                    
                    if (!res.ok) {
                        setServerStatus('error');
                        setError('Failed to fetch bookings');
                        return;
                    }

                    const data = await res.json();
                    setBookings(data);
                    setServerStatus('connected');
                    setError('');
                    setLoading(false);
                } catch (err) {
                    setServerStatus('error');
                    setError('Cannot connect to server. Make sure server.js is running on port 3000.');
                    setLoading(false);
                }
            };

            useEffect(() => {
                fetchBookings();
                const interval = setInterval(fetchBookings, 2000);
                return () => clearInterval(interval);
            }, []);

            const totalBookings = bookings.length;
            const totalRevenue = bookings.reduce((sum, item) => sum + (item.price || 0), 0);

            return (
                <div className="container">
                    <header>
                        <h1>🎨 Booking Notifications</h1>
                        <div className="header-links">
                            <a href="booking3.html">← Back to Gallery</a>
                        </div>
                    </header>

                    <div style={{marginBottom: '2rem', textAlign: 'center'}}>
                        <div className="status-indicator">
                            <div className="status-dot"></div>
                            {serverStatus === 'connected' ? 'Live Updates Active' : serverStatus === 'checking' ? 'Checking Server...' : 'Server Offline'}
                        </div>
                    </div>

                    {error && (
                        <div style={{background: '#f8d7da', color: '#721c24', padding: '1rem', borderRadius: '8px', marginBottom: '2rem', textAlign: 'center', fontWeight: 600}}>
                            ⚠️ {error}
                        </div>
                    )}

                    <div className="stats">
                        <div className="stat-card">
                            <h3>{totalBookings}</h3>
                            <p>Total Bookings</p>
                        </div>
                        <div className="stat-card">
                            <h3>₵{totalRevenue.toFixed(2)}</h3>
                            <p>Total Revenue</p>
                        </div>
                    </div>

                    {loading && serverStatus === 'checking' ? (
                        <div className="empty-state">
                            <h2>Loading...</h2>
                            <p>Connecting to server</p>
                        </div>
                    ) : bookings.length === 0 ? (
                        <div className="empty-state">
                            <h2>No Bookings Yet</h2>
                            <p>🎨 Waiting for customers to book artworks...</p>
                        </div>
                    ) : (
                        <div className="notifications">
                            {bookings.map((booking, index) => (
                                <div key={index} className={`notification-item ${booking.new ? 'new' : ''}`}>
                                    <div className="notification-content">
                                        <h3>✅ {booking.title}</h3>
                                        <p><strong>Customer:</strong> {booking.customerName}</p>
                                        <p><strong>Email:</strong> {booking.customerEmail}</p>
                                        {booking.customerPhone && <p><strong>Phone:</strong> {booking.customerPhone}</p>}
                                        {booking.customerAddress && <p><strong>Address:</strong> {booking.customerAddress}</p>}
                                        
                                        <div className="notification-meta">
                                            <div className="meta-item">
                                                📅 {new Date(booking.bookedAt).toLocaleDateString()}
                                            </div>
                                            <div className="meta-item">
                                                🕐 {new Date(booking.bookedAt).toLocaleTimeString()}
                                            </div>
                                        </div>
                                        
                                        <div className="status-badge booked">BOOKED</div>
                                    </div>
                                    <div className="price">₵{booking.price}</div>
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.render(<Notifications />, document.getElementById('root'));
    </script>
</body>
</html>
